<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Infinity Flow Matrix</title>
    <style>
        body {
            background-color: #0d1117;
            color: #58a6ff;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        #terminal-container {
            width: 100%;
            max-width: 800px;
            background-color: #161b22;
            border: 2px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            box-shadow: 0 0 15px rgba(0,0,0,0.5);
        }
        #header-banner {
            color: #8b949e;
            border-bottom: 1px dashed #30363d;
            padding-bottom: 10px;
            margin-bottom: 15px;
            white-space: pre-wrap;
        }
        #nav-crumbs {
            color: #f0883e;
            font-weight: bold;
            margin-bottom: 15px;
        }
        #console-display {
            background-color: #010409;
            border: 1px solid #30363d;
            border-radius: 4px;
            padding: 15px;
            height: 250px;
            overflow-y: auto;
            white-space: pre-wrap;
            margin-bottom: 15px;
            color: #58a6ff;
        }
        #menu-options {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }
        button {
            background-color: #21262d;
            color: #c9d1d9;
            border: 1px solid #30363d;
            padding: 10px;
            border-radius: 4px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            transition: all 0.2s;
        }
        button:hover {
            background-color: #30363d;
            color: #58a6ff;
            border-color: #58a6ff;
        }
        #input-container {
            display: none;
            border-top: 1px solid #30363d;
            padding-top: 15px;
        }
        #user-input {
            width: 70%;
            background-color: #010409;
            border: 1px solid #30363d;
            color: #58a6ff;
            padding: 8px;
            font-family: inherit;
            border-radius: 4px;
        }
        #submit-btn {
            width: 25%;
            text-align: center;
            background-color: #238636;
            color: #ffffff;
        }
    </style>
</head>
<body>

<div id="terminal-container">
    <div id="header-banner">🕉️ YOGA INFINITY FLOW v1.0.0 // PRODUCTION TERMINAL ENGINE 🕉️</div>
    <div id="nav-crumbs">MAIN MENU</div>
    
    <div id="console-display">Initializing system pipeline... READY.</div>
    
    <div id="menu-options">
        </div>

    <div id="input-container">
        <input type="text" id="user-input" placeholder="Type data input parameters here..." onkeydown="if(event.key === 'Enter') handleInputSubmit()">
        <button id="submit-btn" onclick="handleInputSubmit()">EXECUTE</button>
    </div>
</div>

<script src="app.js"></script>

</body>
</html>
