<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Infinity Flow</title>
    <!-- Tailwind CSS Engine -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Inter:wght@300;400;600&display=swap');
        .font-serif-yoga { font-family: 'Cinzel', serif; }
        .font-sans-yoga { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-stone-900 text-stone-100 font-sans-yoga min-h-screen flex flex-col justify-between">

    <!-- Top Glow Header -->
    <header class="border-b border-stone-800 bg-stone-950/50 backdrop-blur py-6 text-center">
        <h1 class="font-serif-yoga text-3xl tracking-widest text-amber-100 drop-shadow-md">YOGA INFINITY FLOW</h1>
        <p class="text-xs tracking-widest text-stone-400 uppercase mt-1">Infinite Cosmic Expansion Matrix</p>
    </header>

    <!-- Main Workspace Matrix -->
    <main class="max-w-4xl w-full mx-auto p-4 md:p-8 flex-grow flex flex-col justify-center">
        
        <!-- Live Tier Counter Stats Bar -->
        <div class="grid grid-cols-3 gap-3 mb-8 text-center">
            <div class="bg-stone-950/60 p-3 rounded-lg border border-stone-800">
                <div class="text-xl font-bold text-amber-200">84</div>
                <div class="text-[10px] uppercase text-stone-400 tracking-wider">Foundational</div>
            </div>
            <div class="bg-stone-950/60 p-3 rounded-lg border border-stone-800">
                <div class="text-xl font-bold text-amber-200">908</div>
                <div class="text-[10px] uppercase text-stone-400 tracking-wider">Master Chart</div>
            </div>
            <div class="bg-stone-950/60 p-3 rounded-lg border border-stone-800">
                <div class="text-xl font-bold text-amber-200">8,000</div>
                <div class="text-[10px] uppercase text-stone-400 tracking-wider">Variations</div>
            </div>
        </div>

        <!-- Configuration Controller Box -->
        <div class="bg-stone-950/40 border border-stone-800/80 rounded-xl p-6 shadow-xl mb-6">
            <h2 class="text-center text-sm tracking-wider text-amber-100/70 uppercase mb-4">Choose a tier and manifest a pose</h2>
            
            <div class="flex flex-col sm:flex-row gap-3 justify-center items-center">
                <!-- Dropdown Selector -->
                <select id="tierSelector" class="w-full sm:w-64 bg-stone-900 border border-stone-700 rounded-lg px-4 py-3 text-stone-200 focus:outline-none focus:border-amber-500 cursor-pointer transition text-sm">
                    <option value="foundational">84 Foundational Asanas</option>
                    <option value="master">908 Master Chart</option>
                    <option value="variations">8,000 Variations</option>
                </select>

                <!-- Trigger Action Button -->
                <button onclick="manifestPose()" class="w-full sm:w-auto bg-amber-600 hover:bg-amber-500 text-stone-950 font-semibold px-8 py-3 rounded-lg transition duration-300 transform active:scale-95 text-sm tracking-wider uppercase">
                    Manifest Pose
                </button>
            </div>
        </div>

        <!-- Dynamic Output Target Matrix -->
        <div id="manifestationDisplay" class="min-h-[220px] bg-stone-950/80 border border-stone-800 rounded-xl p-6 flex flex-col items-center justify-center text-center relative overflow-hidden transition-all duration-500">
            <div id="emptyState" class="text-stone-500 text-sm italic">
                “Yoga is the cessation of the movements of the mind.”<br>
                <span class="text-xs text-stone-600 block mt-2">— Patanjali, Sutra 1.2</span>
            </div>
            <div id="poseContent" class="hidden w-full transition-opacity duration-300"></div>
        </div>

    </main>

    <!-- Footer Copyright -->
    <footer class="text-center py-4 border-t border-stone-900 text-[10px] text-stone-600 tracking-wider">
        SYSTEM LAYER ONLINE • PORT 8080 SYNCHRONIZED
    </footer>

    <!-- Core Interactive Database Engine -->
    <script>
        // Localized Structural Database Mock Assemblies
        const database = {
            foundational: [
                { name: "Bhujangasana (Cobra Pose)", tier: "Tier 1: Foundational Asana", desc: "A deep backward curve expanding the chest axis, flexing the spine spine, and igniting internal metabolic warmth." },
                { name: "Padmasana (Lotus Seat)", tier: "Tier 1: Foundational Asana", desc: "The ultimate cross-legged baseline architecture anchoring structural symmetry for deep cosmic internal meditative focus." },
                { name: "Sirsasana (Headstand Apex)", tier: "Tier 1: Foundational Asana", desc: "King of all physical shapes. Inverts structural blood vectors to quiet surface cognitive loops instantly." }
            ],
            master: [
                { name: "Garudasana (Sovereign Eagle)", tier: "Tier 2: Master Series", desc: "Intense compression wrap of knees and elbows requiring laser-focused internal visual balancing." },
                { name: "Mayurasana (Alchemical Peacock)", tier: "Tier 2: Master Series", desc: "Full horizontal balance balancing bodily load purely upon the elbows directly to stir digestive fire (Agni)." },
                { name: "Natarafasan (Cosmic Dancer Form)", tier: "Tier 2: Master Series", desc: "Elegant overhead backbend grip demonstrating absolute union between supreme grace and internal physical power." }
            ],
            variations: [
                { name: "Vinyasa Fluid Crescent Flow", tier: "Tier 3: Fluid Variation", desc: "Rhythmic movement shifting baseline alignment into high lunges matching internal respiratory flow patterns." },
                { name: "Yin Deep Sleeping Swan", tier: "Tier 3: Passive Variation", desc: "Long, five-minute structural layout targeting connective fascia tissues around pelvic tracking channels." },
                { name: "Hatha Extended Lateral Angle", tier: "Tier 3: Traditional Variation", desc: "Precise geometric extension creating a direct uninterrupted processing line of bio-energy from heel to fingertips." }
            ]
        };

        const vrittis = [
            "A wave of modern life anxiety or time pressure hits your awareness.",
            "You encounter a memory of a difficult life moment or past conflict.",
            "Your mind generates an intense judgment about your progress or day's productivity.",
            "A phantom wave of boredom, restlessness, or physical frustration arises.",
            "An impulse of attachment, checking your notifications, or chasing distraction surfaces."
        ];

        function manifestPose() {
            const display = document.getElementById('manifestationDisplay');
            const emptyState = document.getElementById('emptyState');
            const content = document.getElementById('poseContent');
            const activeTier = document.getElementById('tierSelector').value;

            // Sakshi Bhava Intercept Engine (30% Probability matching Java application)
            if (Math.random() < 0.3) {
                const randomVritti = vrittis[Math.floor(Math.random() * vrittis.length)];
                
                emptyState.classList.add('hidden');
                content.classList.remove('hidden');
                display.className = "min-h-[220px] bg-amber-950/30 border-2 border-amber-700/80 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-500";
                
                content.innerHTML = `
                    <div class="animate-fade-in">
                        <span class="text-amber-400 text-xs tracking-widest uppercase font-semibold block mb-2">👁️ Witness Intercept - Sakshi Bhava 👁️</span>
                        <div class="h-px w-16 bg-amber-700 mx-auto mb-4"></div>
                        <p class="text-amber-200 text-sm italic max-w-md mx-auto mb-4">"${randomVritti}"</p>
                        <p class="text-xs text-stone-400 max-w-sm mx-auto mb-5">Do not engage, suppress, or judge this wave. Watch it cross your mind and dissolve.</p>
                        <button onclick="bypassWitness('${activeTier}')" class="bg-amber-700 hover:bg-amber-600 text-amber-100 text-xs px-4 py-2 rounded uppercase font-semibold tracking-wider transition">
                            Rest as the Witness
                        </button>
                    </div>
                `;
                return;
            }

            // Normal Generation Logic Sequence
            renderPose(activeTier);
        }

        function bypassWitness(tier) {
            renderPose(tier);
        }

        function renderPose(tier) {
            const display = document.getElementById('manifestationDisplay');
            const emptyState = document.getElementById('emptyState');
            const content = document.getElementById('poseContent');
            
            // Standard reset styling parameters
            display.className = "min-h-[220px] bg-stone-950/80 border border-stone-800 rounded-xl p-6 flex flex-col items-center justify-center text-center transition-all duration-500";
            emptyState.classList.add('hidden');
            content.classList.remove('hidden');

            const tierCollection = database[tier];
            const chosenPose = tierCollection[Math.floor(Math.random() * tierCollection.length)];

            // Animal Medicine Logic Mapping
            let animalBlock = "";
            const lowerName = chosenPose.name.toLowerCase();
            if (lowerName.includes("cobra")) {
                animalBlock = `<div class="mt-4 pt-3 border-t border-stone-800/60 text-left w-full max-w-md mx-auto">
                    <span class="text-[10px] tracking-widest text-emerald-400 font-bold uppercase block mb-1">🐾 Animal Medicine Activated</span>
                    <p class="text-xs text-stone-400"><strong class="text-stone-300">Royal Serpent:</strong> Teaches shedding old skins, letting go of past worries, and melting protective armor into a calm mind.</p>
                </div>`;
            } else if (lowerName.includes("peacock")) {
                animalBlock = `<div class="mt-4 pt-3 border-t border-stone-800/60 text-left w-full max-w-md mx-auto">
                    <span class="text-[10px] tracking-widest text-purple-400 font-bold uppercase block mb-1">🐾 Animal Medicine Activated</span>
                    <p class="text-xs text-stone-400"><strong class="text-stone-300">Alchemical Fire:</strong> The peacock consumes toxic items transforming them into radiant beauty. Burn through mental toxins.</p>
                </div>`;
            } else if (lowerName.includes("eagle")) {
                animalBlock = `<div class="mt-4 pt-3 border-t border-stone-800/60 text-left w-full max-w-md mx-auto">
                    <span class="text-[10px] tracking-widest text-blue-400 font-bold uppercase block mb-1">🐾 Animal Medicine Activated</span>
                    <p class="text-xs text-stone-400"><strong class="text-stone-300">Sovereign Sky:</strong> Develop fierce unblinking layout focus and rise effortlessly above micro daily human distractions.</p>
                </div>`;
            }

            content.innerHTML = `
                <div class="scale-98 transition-all duration-300">
                    <span class="text-[10px] tracking-widest text-amber-500 uppercase font-semibold block mb-1">${chosenPose.tier}</span>
                    <h3 class="font-serif-yoga text-xl text-stone-100 font-bold tracking-wide mb-3">${chosenPose.name}</h3>
                    <p class="text-sm text-stone-300 max-w-lg mx-auto leading-relaxed mb-2">${chosenPose.desc}</p>
                    ${animalBlock}
                </div>
            `;
        }
    </script>
</body>
</html>
