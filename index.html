<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoga Infinity Flow Matrix</title>
    <style>
        body {
            background-color: #0f0e0e;
            color: #ffffff;
            font-family: 'Cinzel', 'Georgia', serif;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        #header-container {
            text-align: center;
            margin-bottom: 50px;
        }
        h1 {
            color: #f7e7ad;
            font-size: 2.5rem;
            letter-spacing: 4px;
            margin: 0 0 10px 0;
            font-weight: 400;
            text-transform: uppercase;
        }
        #subtitle {
            color: #8c8275;
            font-size: 0.9rem;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        /* Clickable Metrics Cards */
        #metrics-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 900px;
            margin-bottom: 30px;
        }
        .metric-card {
            background-color: #141212;
            border: 1px solid #24201e;
            border-radius: 8px;
            padding: 25px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .metric-card:hover {
            background-color: #1c1918;
            border-color: #cc721b;
            transform: translateY(-2px);
        }
        .metric-number {
            color: #e5a93c;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .metric-label {
            color: #8c8275;
            font-size: 0.8rem;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Control Panel */
        #control-panel {
            background-color: #141212;
            border: 1px solid #24201e;
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            text-align: center;
            margin-bottom: 30px;
        }
        .panel-title {
            color: #f7e7ad;
            font-size: 1rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 20px;
        }
        .interface-row {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        select {
            background-color: #1c1918;
            color: #ffffff;
            border: 1px solid #3a332f;
            padding: 12px 20px;
            font-size: 1rem;
            border-radius: 6px;
            width: 320px;
            font-family: inherit;
        }
        button {
            background-color: #cc721b;
            color: #000000;
            border: none;
            padding: 12px 30px;
            font-size: 1rem;
            font-weight: bold;
            letter-spacing: 1px;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            transition: background 0.2s;
        }
        button:hover {
            background-color: #e58324;
        }

        /* Output Display Area */
        #display-panel {
            background-color: #141212;
            border: 1px solid #24201e;
            border-radius: 8px;
            padding: 40px;
            width: 100%;
            max-width: 900px;
            box-sizing: border-box;
            text-align: center;
            min-height: 200px;
        }
        #tier-badge {
            color: #e5a93c;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 15px;
        }
        #pose-title {
            font-size: 2rem;
            color: #ffffff;
            margin: 0 0 20px 0;
            font-weight: 400;
        }
        #pose-description {
            color: #bfaea1;
            font-size: 1.1rem;
            line-height: 1.6;
            max-width: 700px;
            margin: 0 auto;
        }
    </style>
</head>
<body>

    <div id="header-container">
        <h1>Yoga Infinity Flow</h1>
        <div id="subtitle">Infinite Cosmic Expansion Matrix</div>
    </div>

    <div id="metrics-container">
        <div class="metric-card" id="card-tier1">
            <div class="metric-number">84</div>
            <div class="metric-label">Foundational</div>
        </div>
        <div class="metric-card" id="card-tier2">
            <div class="metric-number">908</div>
            <div class="metric-label">Master Chart</div>
        </div>
        <div class="metric-card" id="card-shiva">
            <div class="metric-number">8,000</div>
            <div class="metric-label">Variations</div>
        </div>
    </div>

    <div id="control-panel">
        <div class="panel-title">Choose a Tier and Manifest a Pose</div>
        <div class="interface-row">
            <select id="tier-select">
                <option value="all">All Available Asanas</option>
                <option value="tier1">84 Foundational Asanas</option>
                <option value="tier2">908 Master Chart Edition</option>
                <option value="shiva">8,400,000 Divine Asanas of Lord Shiva</option>
            </select>
            <button id="manifest-btn">Manifest Pose</button>
        </div>
    </div>

    <div id="display-panel">
        <div id="tier-badge">System Ready</div>
        <h2 id="pose-title">Select parameters above</h2>
        <p id="pose-description">Click a status metric block or configure the dropdown module filters to pull data pathways from the matrix.</p>
    </div>

    <script src="app.js"></script>

</body>
</html>
