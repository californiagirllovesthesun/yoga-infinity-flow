<!DOCTYPE html>
<html>
  <head>
    <title>Animated Flower</title>
    <style>
      canvas {
        border: 1px solid #000;
  #body {
  background-color: green;
  }
      }
    </style>
  </head>
  <body>
     <canvas id="flowerCanvas" width="830"  height="200"></canvas>

    <script>
      // Get the canvas element and its context
      const canvas = document.getElementById('flowerCanvas');
      const ctx = canvas.getContext('2d');

      // Flower variables
      let petalCount = 5;
      let petalSize = 10;
      let flowerSize = 50;
      let growSpeed = 1;

      // Position variables
      let x = canvas.width / 2;
      let y = canvas.height / 2;

      // Animation loop
      function animate() {
        // Clear the canvas
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw the flower
        drawFlower();

        // Increase the size of the flower
        flowerSize += growSpeed;

        // Request the next animation frame
        requestAnimationFrame(animate);
      }

      // Draw the flower
      function drawFlower() {
        // Draw petals
        for (let i = 0; i < petalCount; i++) {
          const angle = (i * 2 * Math.PI) / petalCount;
          const petalX = x + Math.cos(angle) * flowerSize;
          const petalY = y + Math.sin(angle) * flowerSize;
          ctx.beginPath();
          ctx.arc(petalX, petalY, petalSize, 0, 2 * Math.PI);
          ctx.fillStyle = 'yellow';
          ctx.fill();
        }

        // Draw the center of the flower
        ctx.beginPath();
        ctx.arc(x, y, petalSize, 0, 2 * Math.PI);
        ctx.fillStyle = 'green';
        ctx.fill();
      }

      // Start the animation
      animate();
    </script>
    
    
    
    
  </body>
</html>
